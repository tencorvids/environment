services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    hostname: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "6881:6881/tcp" # qbitorrent
      - "6881:6881/udp" # qbitorrent
      - "8085:8085/tcp" # qbitorrent
      - "7878:7878/tcp" # radarr
      - "9696:9696/tcp" # prowlarr
    volumes:
      - /srv/docker/appdata/gluetun:/gluetun
    env_file:
      - /var/lib/stacks/torrent/.env
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - UPDATER_PERIOD=24h

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - /srv/docker/appdata/qbittorrent:/config
      - /srv/docker/data/torrents:/downloads
    env_file:
      - /var/lib/stacks/torrent/.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8085
      - TORRENTING_PORT=6881

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - /srv/docker/appdata/prowlarr:/config
    env_file:
      - /var/lib/stacks/torrent/.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - /srv/docker/appdata/radarr:/config
      - /srv/docker/data/media/movies:/movies
      - /srv/docker/data/torrents:/downloads
    env_file:
      - /var/lib/stacks/torrent/.env
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
